# Driftnote configuration. Secrets come from env vars (DRIFTNOTE_*).

[schedule]
# All cron expressions are evaluated in [schedule.timezone].
daily_prompt   = "0 21 * * *"
weekly_digest  = "0 8 * * 1"
monthly_digest = "0 8 1 * *"
yearly_digest  = "0 8 1 1 *"
imap_poll      = "*/5 * * * *"
timezone       = "Europe/London"

[email]
imap_folder            = "Driftnote/Inbox"
imap_processed_folder  = "Driftnote/Processed"
# Recommended: use Gmail plus-addressing so every Driftnote email
# (prompts + digests + alerts + replies) is filterable by `deliveredto:`.
# All emails to <you>+<anything>@gmail.com land in <you>@gmail.com's mailbox.
recipient              = "you+driftnote@gmail.com"
# Optional. When set, every outgoing email gets a `Reply-To:` header so
# replies route to the alias instead of the bare From: address. Match this
# to `recipient` for the cleanest one-line filter rule.
reply_to               = "you+driftnote@gmail.com"
sender_name            = "Driftnote"
imap_host              = "imap.gmail.com"
imap_port              = 993
imap_tls               = true
smtp_host              = "smtp.gmail.com"
smtp_port              = 587
smtp_tls               = false
smtp_starttls          = true

[prompt]
subject_template = "[Driftnote] How was {date}?"
body_template    = "templates/emails/prompt.txt.j2"

[parsing]
mood_regex = '^\s*Mood:\s*(\S+)'
tag_regex  = '#(\w+)'
max_photos = 4
max_videos = 2

[digests]
weekly_enabled  = true
monthly_enabled = true
yearly_enabled  = true

[backup]
retain_months = 12
encrypt       = false
age_key_path  = ""

[disk]
warn_percent  = 80
alert_percent = 95
check_cron    = "0 */6 * * *"
data_path     = "/var/driftnote/data"
