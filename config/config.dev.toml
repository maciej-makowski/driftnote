[schedule]
daily_prompt   = "0 21 * * *"
weekly_digest  = "0 8 * * 1"
monthly_digest = "0 8 1 * *"
yearly_digest  = "0 8 1 1 *"
imap_poll      = "*/5 * * * *"
timezone       = "Europe/London"

[email]
imap_folder            = "INBOX"
imap_processed_folder  = "INBOX.Processed"
recipient              = "you@example.com"
sender_name            = "Driftnote (dev)"
imap_host              = "mail"
imap_port              = 3143
imap_tls               = false
smtp_host              = "mail"
smtp_port              = 3025
smtp_tls               = false
smtp_starttls          = false

[prompt]
subject_template = "[Driftnote] How was {date}?"
body_template    = "templates/emails/prompt.txt.j2"

[parsing]
mood_regex = '^\s*Mood:\s*(\S+)'
tag_regex  = '#(\w+)'
max_photos = 4
max_videos = 2

[digests]
weekly_enabled  = true
monthly_enabled = true
yearly_enabled  = true

[backup]
retain_months = 12
encrypt       = false
age_key_path  = ""

[disk]
warn_percent  = 80
alert_percent = 95
check_cron    = "0 */6 * * *"
data_path     = "/var/driftnote/data"
