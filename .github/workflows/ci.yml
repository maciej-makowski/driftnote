name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Reinstall mypy from source
        # mypy's compiled (mypyc) wheels segfault on ubuntu-latest's Python 3.14
        # build, but the pure-Python build is stable. Force-reinstall from sdist.
        run: uv pip install --reinstall --no-binary=mypy "mypy<1.20"

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy

      - name: Tests (excluding live)
        run: uv run pytest -m "not live" -v --cov=driftnote --cov-report=term-missing

  build-container:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build container (smoke)
        run: |
          docker build -f Containerfile -t driftnote:ci .
