name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        # Pinning latest-major (v8) so we get a uv recent enough to manage
        # a fully-patched Python 3.14. uv 0.5.x predates 3.14 and resolves
        # to an incomplete build that's missing PEP-750 ast nodes (mypy crashes
        # importing ast.TemplateStr).
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy

      - name: Tests (excluding live)
        run: uv run pytest -m "not live" -v --cov=driftnote --cov-report=term-missing

  build-container:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Build container (smoke)
        run: |
          docker build -f Containerfile -t driftnote:ci .
